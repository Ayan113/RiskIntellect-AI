services:
  - type: web
    name: riskintellect-ai
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "PYTHONPATH=. uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: .
